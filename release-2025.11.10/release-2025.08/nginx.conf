# /usr/local/openresty/nginx/conf/nginx.conf
worker_processes  1;
error_log  /dev/stderr info;

# 把容器環境變數傳進 worker（Lua 讀得到）
env CLIENT_ID;
env CLIENT_SECRET;
env KC_TOKEN_URL;

events { worker_connections 1024; }

http {
  # ★★★ 關鍵：讓 Lua HTTP 能解析 docker 服務名（如 keycloak）
  resolver 127.0.0.11 ipv6=off valid=30s;
  resolver_timeout 5s;

  lua_shared_dict oidc 10m;
  client_max_body_size 50m;
  underscores_in_headers on;

  init_by_lua_block {
    http  = require "resty.http"
    json  = require "cjson.safe"

    function fetch_token()
      local dict = ngx.shared.oidc
      local token = dict:get("token")
      local exp   = dict:get("exp") or 0
      local now   = ngx.time()
      if token and exp - now > 60 then
        return token
      end

      local client_id     = os.getenv("CLIENT_ID")     or ""
      local client_secret = os.getenv("CLIENT_SECRET") or ""
      local token_url     = os.getenv("KC_TOKEN_URL")  or ""
      if token_url == "" or client_id == "" or client_secret == "" then
        ngx.log(ngx.ERR, "missing env: KC_TOKEN_URL/CLIENT_ID/CLIENT_SECRET")
        return nil
      end

      local httpc = http.new()
      httpc:set_timeout(5000)
      local res, err = httpc:request_uri(token_url, {
        method = "POST",
        body = "grant_type=client_credentials"
              .."&client_id="..ngx.escape_uri(client_id)
              .."&client_secret="..ngx.escape_uri(client_secret),
        headers = { ["Content-Type"] = "application/x-www-form-urlencoded" },
      })
      if not res then
        ngx.log(ngx.ERR, "token request failed: ", err)
        return nil
      end
      local body = json.decode(res.body)
      if not body or not body.access_token then
        ngx.log(ngx.ERR, "bad token response: ", res.body)
        return nil
      end
      local ttl = tonumber(body.expires_in or 300)
      dict:set("token", body.access_token, ttl - 60)
      dict:set("exp", ngx.time() + ttl)
      return body.access_token
    end
  }

  upstream hapi_backend { server hapi:8080; }

  server {
    # 8081 對外（compose 會把 host:8081 -> 這裡的 8080）
    listen 0.0.0.0:8080;

    location / {
      # 取/快取 token，並注入 Authorization
      access_by_lua_block {
        local t = fetch_token()
        if not t then
          return ngx.exit(ngx.HTTP_SERVICE_UNAVAILABLE)
        end
        ngx.req.set_header("Authorization", "Bearer " .. t)
      }

      proxy_http_version 1.1;
      proxy_set_header Host               $host;
      proxy_set_header X-Forwarded-Host   $host;
      proxy_set_header X-Forwarded-Proto  $scheme;
      proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header Connection         "";

      proxy_read_timeout 300s;
      proxy_send_timeout 300s;

      proxy_pass http://hapi_backend;
    }
  }
}
